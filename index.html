<!doctype html>
<html lang="en" class="dark" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#090909" />
    <meta name="color-scheme" content="dark light" />
    <script>
      // Apply stored theme before React hydrates to avoid a light-flash.
      // Dark is the default; only switch to light if the user explicitly chose it.
      (function () {
        try {
          var stored = localStorage.getItem('ismail-biryani-theme');
          if (stored === 'light') {
            document.documentElement.classList.remove('dark');
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <!-- Prevent Chrome / Google auto-translate from wrapping text nodes in
         <font> tags, which corrupts React's DOM reconciliation and causes
         NotFoundError: Failed to execute 'insertBefore' on 'Node'. -->
    <meta name="google" content="notranslate" />

    <title>Ismail Biryani — The Art of Authentic Hyderabadi Dum Biryani | Addanki</title>
    <meta
      name="description"
      content="Since 2005, Ismail Biryani has been crafting premium Hyderabadi Dum Biryani with aged basmati, traditional masalas and Sneha Farm chicken. Visit our Addanki branch."
    />
    <meta name="author" content="Ismail Biryani — Addanki" />
    <meta name="keywords" content="Ismail Biryani, Hyderabadi Dum Biryani, Addanki biryani, Ongole biryani, best biryani in Prakasam, Sneha Farm chicken biryani, family biryani, catering Addanki" />

    <link rel="canonical" href="https://ismailbiryani.com" />
